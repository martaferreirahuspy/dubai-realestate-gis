name: Dubai RE — Weekly Pipeline

on:
  schedule:
    # Every Monday at 06:00 UTC (08:00 Dubai time)
    - cron: "0 6 * * 1"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  run-pipeline:
    name: Fetch → Map → Snowflake
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        env:
          # Dubai Pulse API
          DUBAI_PULSE_CLIENT_ID:     ${{ secrets.DUBAI_PULSE_CLIENT_ID }}
          DUBAI_PULSE_CLIENT_SECRET: ${{ secrets.DUBAI_PULSE_CLIENT_SECRET }}
          # Google Maps (for geocoding new unmapped areas)
          GOOGLE_MAPS_API_KEY:       ${{ secrets.GOOGLE_MAPS_API_KEY }}
          # Snowflake
          SNOWFLAKE_ACCOUNT:         ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:            ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:        ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE:       ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE:        ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA:          ${{ secrets.SNOWFLAKE_SCHEMA }}
          SNOWFLAKE_TABLE:           ${{ secrets.SNOWFLAKE_TABLE }}
          SNOWFLAKE_ROLE:            ${{ secrets.SNOWFLAKE_ROLE }}
        run: bash pipeline/run_pipeline.sh

      - name: Commit updated geocode cache
        # Persist any newly geocoded areas so they don't cost API calls next run
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pipeline/geocode_cache.json || true
          git diff --staged --quiet || git commit -m "chore: update geocode cache [skip ci]"
          git push || true
